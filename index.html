<!DOCTYPE html>

        <script src="anime.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded',function(){
                const form = document.querySelector('form');
                if(form) {
                    form.addEventListener('submit',function(e){
                        alert('hello ' + document.querySelector('#name').value +' ! Welcome to my homepage!');
                        e.preventDefault();
                    });
                }
                const generationBtn = document.querySelector('#generate-btn');
                const quoteText = document.querySelector('#quote-id');
                const quoteAuthor = document.querySelector('#quote-author');
                if(generationBtn){
                    generationBtn.addEventListener('click',function(){
                        if(typeof quotes !== 'undefined' && quotes.length > 0) {
                            const randomIndex = Math.floor(Math.random() * quotes.length);
                            const selectedQuote = quotes[randomIndex];
                            quoteText.textContent = "“" + selectedQuote.text + "”";
                            quoteAuthor.textContent = "—— " + selectedQuote.author;
                            quoteAuthor.style.display = 'block'; 
                        }
                    });
                }
            });
        </script>
